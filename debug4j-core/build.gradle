plugins {
    id 'java'
}

group = 'com.k4ln'
version = '1.0-SNAPSHOT'

dependencies {
    implementation project(":debug4j-common")

    implementation 'org.smartboot.socket:aio-pro:1.6.6'

    implementation 'net.bytebuddy:byte-buddy:1.15.10'
    implementation 'net.bytebuddy:byte-buddy-agent:1.15.10'
    implementation 'org.javassist:javassist:3.30.2-GA'

    implementation 'io.github.skylot:jadx-core:1.5.1'
    implementation 'io.github.skylot:jadx-java-input:1.5.1'

    // 仅编译需要 log4j2 -> Log4j2Adapter。如果依赖的类不多的，可以使用类遮蔽的方式覆盖，参考debug4j-spring-boot-starter#CommandLineArgs
    compileOnly "org.apache.logging.log4j:log4j-core:2.25.3"

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}